<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Mahir Enterprise | রিপোর্ট ড্যাশবোর্ড</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* লগইন ওভারলে - মোবাইল ফ্রেন্ডলি */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 300px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      text-align: center;
      border: 1px solid #e2e8f0;
    }

    .login-card h3 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0f3b3f;
      margin-bottom: 6px;
    }

    .login-sub {
      color: #5b6e8c;
      font-size: 0.75rem;
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 12px;
      font-size: 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 44px;
      outline: none;
      background: #fff;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 500;
    }

    .login-card input:focus {
      border-color: #2c7a6e;
      box-shadow: 0 0 0 3px rgba(44,122,110,0.1);
    }

    .login-btn {
      background: #1e5f6b;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 44px;
      font-weight: 600;
      font-size: 0.95rem;
      color: white;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-btn:active {
      transform: scale(0.97);
      background: #0f4a54;
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.7rem;
      margin-top: 12px;
      background: #fee2e2;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
    }

    /* মেইন ড্যাশবোর্ড - কোন হেডার ছাড়া, শুধু কার্ড গ্রিড */
    .dashboard {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      display: none;
    }

    .dashboard.visible {
      display: block;
    }

    /* কার্ড গ্রিড - ছোট, টেক্সট বেসড, মোবাইল ইউআই */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 30px;
    }

    /* কার্ড স্টাইল - নরমাল, সাদা, ছায়া ছাড়া মিনিমাল, আইকন নেই */
    .report-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 14px 18px;
      transition: all 0.15s ease;
      border: 1px solid #e2edf2;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .report-card:active {
      background: #f8fafc;
      transform: scale(0.99);
    }

    .report-link {
      text-decoration: none;
      color: #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .report-name {
      flex: 1;
      word-break: break-word;
      padding-right: 12px;
    }

    .arrow-symbol {
      color: #7c8ea0;
      font-size: 1.1rem;
      font-weight: 400;
      opacity: 0.7;
    }

    /* খালি কার্ডের জন্য বিশেষ স্টাইল (প্লেসহোল্ডার) - পরে লিংক এড হবে */
    .empty-card {
      background: #fefce8;
      border: 1px dashed #cbd5a0;
    }
    .empty-card .report-name {
      color: #7f8c5e;
      font-weight: 450;
    }
    .empty-card .arrow-symbol {
      color: #b9c28a;
    }

    /* লগআউট বাটন - ছোট, সাদাসিধে */
    .logout-wrapper {
      margin-top: 24px;
      text-align: center;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #cbd5e1;
      padding: 10px 20px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #4b5563;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:active {
      background: #f1f5f9;
    }

    .footer-meta {
      text-align: center;
      font-size: 0.6rem;
      color: #8ba0b5;
      margin-top: 32px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<!-- লগইন স্ক্রিন -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <h3>মাহির এন্টারপ্রাইজ</h3>
    <div class="login-sub">পিন দিন • নিরাপদ প্রবেশ</div>
    <input type="password" id="pinInput" placeholder="পিন নম্বর" inputmode="numeric" autocomplete="off">
    <button class="login-btn" id="loginBtn">ড্যাশবোর্ড খুলুন</button>
    <div id="loginError" style="min-height: 44px;"></div>
  </div>
</div>

<!-- মেইন ড্যাশবোর্ড (কোনো হেডার নেই, শুধু কার্ড) -->
<div id="dashboard" class="dashboard">
  <!-- কার্ডের গ্রিড: এখানে রেন্ডার হবে অনেকগুলো কার্ড (খালি + লিংকসহ) -->
  <div id="cardsContainer" class="cards-grid"></div>

  <div class="logout-wrapper">
    <button id="logoutBtn" class="logout-btn">লগআউট</button>
  </div>
  <div class="footer-meta">🔒 Powered By Eunus EAS</div>
</div>

<script>
  (function() {
    // ======================= DAILY PIN (DDMMYY) =======================
    function getTodayPIN() {
      const d = new Date();
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = String(d.getFullYear()).slice(-2);
      return day + month + year;   // উদাহরণ: 060426
    }

    // ======================= রিপোর্ট লিস্ট (খালি কার্ড সহ) =======================
    // এখানে ইচ্ছামত কার্ড এড করা যাবে। আগের ৩টি লিংক রাখা আছে + অনেকগুলো খালি কার্ড (পরে লিংক দেয়া হবে)
    const reportsList = [
      { name: "Agent Performance Report", link: "https://docs.google.com/spreadsheets/d/1k-nS7ykk1OC25EJrEanMPoX7x5cZtRe_/edit?usp=sharing&ouid=102438858847225639241&rtpof=true&sd=true", isEmpty: false },
      { name: "Top 100 Agents", link: "https://docs.google.com/spreadsheets/d/1eFL_mjGTuJg9oeun4x8sFmYAw3FtkFhp/edit?usp=sharing&ouid=102438858847225639241&rtpof=true&sd=true", isEmpty: false },
      { name: "সম্ভাব্য নতুন এজেন্ট ডকুমেন্ট সাবমিশন", link: "https://forms.gle/5xYHzVnxEbRyMaYQ6", isEmpty: false },
      // ----- খালি কার্ড (পরে লিংক যোগ করা হবে) -----
      { name: "EKYC App Download Link", link: "https://docs.google.com/document/d/1sVrZMPd7foReMDoXOwHpPW3Q45MidDyf8K7KTlU_FLY/edit?usp=drivesdk", isEmpty: false, placeholderNote: "লিংক যুক্ত হবে" },
      { name: "এজেন্ট কে.পি.আই সারাংশ", link: "", isEmpty: true },
      { name: "প্রমোশন ট্র্যাকার", link: "", isEmpty: true },
      { name: "টার্গেট VS অর্জন", link: "", isEmpty: true },
      { name: "জোনভিত্তিক পারফরম্যান্স", link: "", isEmpty: true },
      { name: "নতুন এজেন্ট অনবোর্ডিং লিস্ট", link: "", isEmpty: true },
      { name: "মাসিক রিভিউ (ড্রাফ্ট)", link: "", isEmpty: true },
      { name: "কাস্টমার ফিডব্যাক সংক্ষেপ", link: "", isEmpty: true },
      { name: "লিড কনভার্সন রিপোর্ট", link: "", isEmpty: true },
      { name: "এটেন্ডেন্স সারাংশ", link: "", isEmpty: true }
    ];

    // ডম এলিমেন্টস
    const loginOverlay = document.getElementById('loginOverlay');
    const dashboardDiv = document.getElementById('dashboard');
    const pinInput = document.getElementById('pinInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('loginError');
    const cardsContainer = document.getElementById('cardsContainer');
    const logoutBtn = document.getElementById('logoutBtn');

    // কার্ড রেন্ডার ফাংশন - ছোট, টেক্সট বেসড, কোনো আইকন নেই, মোবাইল-ফ্রেন্ডলি
    function renderAllCards() {
      if (!cardsContainer) return;
      cardsContainer.innerHTML = '';

      reportsList.forEach((item, idx) => {
        const card = document.createElement('div');
        // ক্লাস: বেস কার্ড + যদি খালি হয় তবে empty-card স্টাইল
        card.className = 'report-card';
        if (item.isEmpty || !item.link) {
          card.classList.add('empty-card');
        }

        // লিংক wrapper - যদি লিংক থাকে তাহলে <a> ট্যাগ, না থাকলে div (ক্লিকযোগ্য না)
        const linkWrapper = document.createElement(item.link && !item.isEmpty ? 'a' : 'div');
        if (item.link && !item.isEmpty) {
          linkWrapper.href = item.link;
          linkWrapper.target = '_blank';
          linkWrapper.rel = 'noopener noreferrer';
          linkWrapper.className = 'report-link';
        } else {
          linkWrapper.className = 'report-link';
          // খালি কার্ডের জন্য কোনো রিডাইরেক্ট হবে না, স্টাইলিং একই রাখা
          linkWrapper.style.cursor = 'default';
        }

        // নামের অংশ
        const nameSpan = document.createElement('span');
        nameSpan.className = 'report-name';
        nameSpan.innerText = item.name;
        
        // ডান পাশে তীর চিহ্ন (খালি কার্ডেও থাকবে, কিন্তু ক্লিকযোগ্য নয়)
        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'arrow-symbol';
        arrowSpan.innerText = '→';
        
        linkWrapper.appendChild(nameSpan);
        linkWrapper.appendChild(arrowSpan);
        card.appendChild(linkWrapper);
        
        // যদি খালি কার্ড হয় এবং লিংক না থাকে, তবুও সাদাসিধে UI, টুলটিপ বা মেসেজ লাগবে না, শুধু ভিজুয়াল আলাদা
        if (item.isEmpty || !item.link) {
          // খালি কার্ডগুলোর জন্য অ্যারো হালকা করে দেওয়া আছে, ক্লিক করলে কিছু হয় না
          // ইউজার বুঝতে পারে পরবর্তীতে লিংক এড হবে
          linkWrapper.addEventListener('click', (e) => {
            if (!item.link || item.isEmpty) {
              e.preventDefault();
              // (অপশনাল) ছোট নোটিফিকেশন? আমরা চুপ থাকি, কারণ সিম্পল ইউআই চাওয়া হয়েছে
              // তবে ইচ্ছে করলে হালকা টোস্ট দেওয়া যায়, কিন্তু না রাখলেই ভালো
            }
          });
        }
        
        cardsContainer.appendChild(card);
      });
    }

    // লগইন সফল হলে ড্যাশবোর্ড দেখানো
    function showDashboard() {
      loginOverlay.style.display = 'none';
      dashboardDiv.classList.remove('hidden');
      dashboardDiv.classList.add('visible');
      // কার্ড রেন্ডার
      renderAllCards();
    }

    // লগইন চেক
    function attemptLogin() {
      const enteredPin = pinInput.value.trim();
      const correctPin = getTodayPIN();
      
      if (enteredPin === correctPin) {
        // সাফল্য
        errorDiv.innerHTML = '';
        showDashboard();
        pinInput.value = '';
      } else {
        errorDiv.innerHTML = '<div class="error-msg">❌ ভুল পিন। আবার চেষ্টা করুন</div>';
        pinInput.value = '';
        pinInput.focus();
        // ছোট এনিমেশন (শেক ইফেক্ট)
        const loginCard = document.querySelector('.login-card');
        if (loginCard) {
          loginCard.style.transform = 'translateX(3px)';
          setTimeout(() => { if(loginCard) loginCard.style.transform = ''; }, 100);
        }
      }
    }

    // লগআউট (পূর্ণ রিসেট)
    function logoutAndReset() {
      // ড্যাশবোর্ড লুকান
      dashboardDiv.classList.remove('visible');
      dashboardDiv.classList.add('hidden');
      // লগইন ওভারলেই দেখান
      loginOverlay.style.display = 'flex';
      if (pinInput) pinInput.value = '';
      if (errorDiv) errorDiv.innerHTML = '';
      // কার্ড কন্টেইনার খালি করা (যাতে পুনরায় ঢুকলে তাজা থাকে)
      if (cardsContainer) cardsContainer.innerHTML = '';
      // ফোকাস
      setTimeout(() => pinInput && pinInput.focus(), 30);
    }

    // ইভেন্ট লিসেনার
    if (loginBtn) loginBtn.addEventListener('click', attemptLogin);
    if (pinInput) {
      pinInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') attemptLogin();
      });
    }
    if (logoutBtn) logoutBtn.addEventListener('click', logoutAndReset);

    // পেজ ক্যাশে/ব্যাক বাটন রিলেটেড: অসঙ্গতি দেখা দিলে লগইন অবস্থায় রিসেট
    window.addEventListener('pageshow', (event) => {
      // যদি ড্যাশবোর্ড ভিজিবল কিন্তু ওভারলেও হাইডেন না থাকে (বিরল কেস)
      if (loginOverlay && dashboardDiv) {
        if (loginOverlay.style.display !== 'none' && dashboardDiv.classList.contains('visible')) {
          logoutAndReset();
        } else if (loginOverlay.style.display === 'none' && dashboardDiv.classList.contains('hidden')) {
          // অদ্ভুত অবস্থা: ওভারলেও নেই, ড্যাশবোর্ডও নেই। রিলোডের মতো রিসেট
          logoutAndReset();
        }
      }
    });
    
    // অতিরিক্ত: লিংক যুক্ত করার পর খালি কার্ড গুলো ভবিষ্যতে আপডেট করার জন্য কনসোল হেল্পার নেই, 
    // তবে ডেভেলপার চাইলে reportsList অ্যারের অবজেক্টের link সম্পাদনা করলেই হবে।
    // এছাড়াও UI টেক্সট বেসড, ছোট কার্ড, কোনো হেডার নেই, মোবাইল-অপ্টিমাইজড

    // ডিবাগের জন্য পিন ফরম্যাট জানান (নিরাপত্তায় রাখা)
    console.log("✅ Mahir Enterprise | পিন ফরম্যাট: DDMMYY (আজকের তারিখ অনুযায়ী)");
  })();
</script>
</body>
</html>
