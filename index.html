<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Mahir Enterprise | রিপোর্ট ড্যাশবোর্ড</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* লগইন ওভারলে - মোবাইল ফ্রেন্ডলি */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 300px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      text-align: center;
      border: 1px solid #e2e8f0;
    }

    .login-card h3 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0f3b3f;
      margin-bottom: 6px;
    }

    .login-sub {
      color: #5b6e8c;
      font-size: 0.75rem;
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 12px;
      font-size: 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 44px;
      outline: none;
      background: #fff;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 500;
    }

    .login-card input:focus {
      border-color: #2c7a6e;
      box-shadow: 0 0 0 3px rgba(44,122,110,0.1);
    }

    .login-btn {
      background: #1e5f6b;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 44px;
      font-weight: 600;
      font-size: 0.95rem;
      color: white;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-btn:active {
      transform: scale(0.97);
      background: #0f4a54;
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.7rem;
      margin-top: 12px;
      background: #fee2e2;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
    }

    /* মেইন ড্যাশবোর্ড - কোন হেডার ছাড়া, শুধু কার্ড গ্রিড */
    .dashboard {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      display: none;
    }

    .dashboard.visible {
      display: block;
    }

    /* কার্ড গ্রিড - ছোট, টেক্সট বেসড, মোবাইল ইউআই */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 30px;
    }

    /* কার্ড স্টাইল - নরমাল, সাদা, ছায়া ছাড়া মিনিমাল */
    .report-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 14px 18px;
      transition: all 0.15s ease;
      border: 1px solid #e2edf2;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .report-card:active {
      background: #f8fafc;
      transform: scale(0.99);
    }

    .report-link {
      text-decoration: none;
      color: #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .report-name {
      flex: 1;
      word-break: break-word;
      padding-right: 12px;
    }

    .arrow-symbol {
      color: #7c8ea0;
      font-size: 1.1rem;
      font-weight: 400;
      opacity: 0.7;
    }

    /* খালি কার্ডের জন্য বিশেষ স্টাইল */
    .empty-card {
      background: #fefce8;
      border: 1px dashed #cbd5a0;
    }
    .empty-card .report-name {
      color: #7f8c5e;
      font-weight: 450;
    }

    /* মোডাল বক্স (লিংক দেখানোর জন্য) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-box {
      background: white;
      border-radius: 28px;
      width: 90%;
      max-width: 340px;
      padding: 24px 20px 28px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
      text-align: center;
      animation: modalFadeIn 0.2s ease;
    }

    @keyframes modalFadeIn {
      from {
        transform: scale(0.96);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-box h4 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #0f3b3f;
      margin-bottom: 12px;
    }

    .modal-link-container {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 14px 12px;
      margin: 16px 0;
      word-break: break-all;
      font-size: 0.8rem;
      color: #1e5f6b;
      font-family: monospace;
      text-align: left;
      background: #f1f5f9;
    }

    .copy-btn {
      background: #1e5f6b;
      border: none;
      padding: 10px 20px;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      margin-top: 4px;
    }

    .copy-btn:active {
      transform: scale(0.96);
      background: #0f4a54;
    }

    .copy-feedback {
      font-size: 0.7rem;
      margin-top: 12px;
      color: #2b7e3a;
      font-weight: 500;
    }

    .close-modal-btn {
      background: transparent;
      border: 1px solid #cbd5e1;
      padding: 8px 18px;
      border-radius: 40px;
      margin-top: 12px;
      font-size: 0.8rem;
      color: #4b5563;
      cursor: pointer;
    }

    .close-modal-btn:active {
      background: #f1f5f9;
    }

    .logout-wrapper {
      margin-top: 24px;
      text-align: center;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #cbd5e1;
      padding: 10px 20px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #4b5563;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:active {
      background: #f1f5f9;
    }

    .footer-meta {
      text-align: center;
      font-size: 0.6rem;
      color: #8ba0b5;
      margin-top: 32px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<!-- লগইন স্ক্রিন -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <h3>মাহির এন্টারপ্রাইজ</h3>
    <div class="login-sub">পিন দিন • নিরাপদ প্রবেশ</div>
    <input type="password" id="pinInput" placeholder="পিন নম্বর" inputmode="numeric" autocomplete="off">
    <button class="login-btn" id="loginBtn">ড্যাশবোর্ড খুলুন</button>
    <div id="loginError" style="min-height: 44px;"></div>
  </div>
</div>

<!-- মেইন ড্যাশবোর্ড -->
<div id="dashboard" class="dashboard">
  <div id="cardsContainer" class="cards-grid"></div>

  <div class="logout-wrapper">
    <button id="logoutBtn" class="logout-btn">লগআউট</button>
  </div>
  <div class="footer-meta">🔒 প্রতিদিন পিন পরিবর্তনযোগ্য | শুধুমাত্র অনুমোদিত</div>
</div>

<!-- মোডাল (EKYC লিংক দেখানোর জন্য) -->
<div id="linkModal" class="modal-overlay">
  <div class="modal-box">
    <h4>📲 ই-কেওয়াইসি অ্যাপ ডাউনলোড</h4>
    <div class="modal-link-container" id="modalLinkText">
      https://oss.bkash.com/pub-ekyc-app/EKYC-PROD-release-beta.apk
    </div>
    <button id="copyLinkBtn" class="copy-btn">📋 কপি করুন</button>
    <div id="copyFeedback" class="copy-feedback"></div>
    <button id="closeModalBtn" class="close-modal-btn">বন্ধ করুন</button>
  </div>
</div>

<script>
  (function() {
    // ======================= DAILY PIN (DDMMYY) =======================
    function getTodayPIN() {
      const d = new Date();
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = String(d.getFullYear()).slice(-2);
      return day + month + year;   // উদাহরণ: 060426
    }

    // নির্দিষ্ট লিংক এবং কপি ফিচারের জন্য ডেডিকেটেড কার্ড ডাটা
    const EKYC_LINK = "https://oss.bkash.com/pub-ekyc-app/EKYC-PROD-release-beta.apk";
    
    // ======================= রিপোর্ট লিস্ট (সব কার্ড) =======================
    // আগের লিংক + খালি কার্ড + এখন "EKYC App Download Link" কার্ড যুক্ত করা হলো
    const reportsList = [
      { name: "Agent Performance Report", link: "https://docs.google.com/spreadsheets/d/1k-nS7ykk1OC25EJrEanMPoX7x5cZtRe_/edit?usp=sharing&ouid=102438858847225639241&rtpof=true&sd=true", isEmpty: false, isEkyc: false },
      { name: "Top 100 Agents", link: "https://docs.google.com/spreadsheets/d/1eFL_mjGTuJg9oeun4x8sFmYAw3FtkFhp/edit?usp=sharing&ouid=102438858847225639241&rtpof=true&sd=true", isEmpty: false, isEkyc: false },
      { name: "সম্ভাব্য নতুন এজেন্ট ডকুমেন্ট সাবমিশন", link: "https://forms.gle/5xYHzVnxEbRyMaYQ6", isEmpty: false, isEkyc: false },
      
      // ✅ নতুন EKYC কার্ড - ক্লিক করলে মোডাল খুলবে
      { name: "EKYC App Download Link", link: null, isEmpty: false, isEkyc: true, modalLink: EKYC_LINK },
      
      // খালি কার্ড (পরে লিংক যোগ হবে)
      { name: "দৈনিক সেলস রিপোর্ট", link: "", isEmpty: true, isEkyc: false },
      { name: "এজেন্ট কে.পি.আই সারাংশ", link: "", isEmpty: true, isEkyc: false },
      { name: "প্রমোশন ট্র্যাকার", link: "", isEmpty: true, isEkyc: false },
      { name: "টার্গেট VS অর্জন", link: "", isEmpty: true, isEkyc: false },
      { name: "জোনভিত্তিক পারফরম্যান্স", link: "", isEmpty: true, isEkyc: false },
      { name: "নতুন এজেন্ট অনবোর্ডিং লিস্ট", link: "", isEmpty: true, isEkyc: false },
      { name: "মাসিক রিভিউ (ড্রাফ্ট)", link: "", isEmpty: true, isEkyc: false },
      { name: "কাস্টমার ফিডব্যাক সংক্ষেপ", link: "", isEmpty: true, isEkyc: false },
      { name: "লিড কনভার্সন রিপোর্ট", link: "", isEmpty: true, isEkyc: false },
      { name: "এটেন্ডেন্স সারাংশ", link: "", isEmpty: true, isEkyc: false }
    ];

    // DOM elements
    const loginOverlay = document.getElementById('loginOverlay');
    const dashboardDiv = document.getElementById('dashboard');
    const pinInput = document.getElementById('pinInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('loginError');
    const cardsContainer = document.getElementById('cardsContainer');
    const logoutBtn = document.getElementById('logoutBtn');
    
    // মোডাল এলিমেন্ট
    const modal = document.getElementById('linkModal');
    const modalLinkText = document.getElementById('modalLinkText');
    const copyBtn = document.getElementById('copyLinkBtn');
    const copyFeedback = document.getElementById('copyFeedback');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // মোডাল খোলার ফাংশন (শুধু ই-কেওয়াইসি কার্ডের জন্য)
    function openEkycModal(linkUrl) {
      if (modalLinkText) {
        modalLinkText.innerText = linkUrl;
      }
      // আগের ফিডব্যাক রিসেট
      if (copyFeedback) copyFeedback.innerText = '';
      // মোডাল দেখানো
      modal.classList.add('active');
    }

    function closeModal() {
      modal.classList.remove('active');
      if (copyFeedback) copyFeedback.innerText = '';
    }

    // কপি ফাংশন (মডার্ন clipboard API)
    async function copyLinkToClipboard() {
      const linkToCopy = EKYC_LINK; // কনস্ট্যান্ট লিংক
      try {
        await navigator.clipboard.writeText(linkToCopy);
        if (copyFeedback) {
          copyFeedback.innerText = '✅ লিংক কপি হয়েছে! এখন যেকোনো জায়গায় পেস্ট করুন।';
          setTimeout(() => {
            if (copyFeedback) copyFeedback.innerText = '';
          }, 2500);
        }
      } catch (err) {
        console.error('কপি করতে ব্যর্থ:', err);
        if (copyFeedback) {
          copyFeedback.innerText = '❌ কপি করতে ব্যর্থ, ম্যানুয়ালি কপি করুন।';
          setTimeout(() => {
            if (copyFeedback) copyFeedback.innerText = '';
          }, 2000);
        }
      }
    }

    // কার্ড রেন্ডার ফাংশন (ছোট, টেক্সট বেসড, মোবাইল-ফ্রেন্ডলি)
    function renderAllCards() {
      if (!cardsContainer) return;
      cardsContainer.innerHTML = '';

      reportsList.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'report-card';
        
        // খালি কার্ড স্টাইল (empty-card)
        if (item.isEmpty) {
          card.classList.add('empty-card');
        }
        
        // লিংক wrapper (সাধারণত a ট্যাগ, কিন্তু EKYC কার্ডের জন্য ভিন্ন)
        let linkWrapper;
        
        // যদি EKYC কার্ড হয় (isEkyc true) তাহলে ক্লিক করলে মোডাল খুলবে
        if (item.isEkyc) {
          linkWrapper = document.createElement('div');
          linkWrapper.className = 'report-link';
          linkWrapper.style.cursor = 'pointer';
          linkWrapper.addEventListener('click', (e) => {
            e.preventDefault();
            openEkycModal(EKYC_LINK);
          });
        } 
        else if (item.link && !item.isEmpty) {
          // সাধারণ লিংক কার্ড
          linkWrapper = document.createElement('a');
          linkWrapper.href = item.link;
          linkWrapper.target = '_blank';
          linkWrapper.rel = 'noopener noreferrer';
          linkWrapper.className = 'report-link';
        } 
        else {
          // খালি কার্ড (কোনো লিংক নেই, ক্লিক নিষ্ক্রিয়)
          linkWrapper = document.createElement('div');
          linkWrapper.className = 'report-link';
          linkWrapper.style.cursor = 'default';
          linkWrapper.addEventListener('click', (e) => {
            e.preventDefault();
            // কিছুই না, শুধু খালি কার্ড
          });
        }
        
        // নামের অংশ
        const nameSpan = document.createElement('span');
        nameSpan.className = 'report-name';
        nameSpan.innerText = item.name;
        
        // ডান পাশে তীর চিহ্ন
        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'arrow-symbol';
        arrowSpan.innerText = '→';
        
        linkWrapper.appendChild(nameSpan);
        linkWrapper.appendChild(arrowSpan);
        card.appendChild(linkWrapper);
        cardsContainer.appendChild(card);
      });
    }

    // লগইন ফাংশন
    function attemptLogin() {
      const enteredPin = pinInput.value.trim();
      const correctPin = getTodayPIN();
      
      if (enteredPin === correctPin) {
        errorDiv.innerHTML = '';
        // লগইন সফল: ওভারলে লুকান, ড্যাশবোর্ড দেখান
        loginOverlay.style.display = 'none';
        dashboardDiv.classList.remove('hidden');
        dashboardDiv.classList.add('visible');
        renderAllCards();
        pinInput.value = '';
      } else {
        errorDiv.innerHTML = '<div class="error-msg">❌ ভুল পিন। আবার চেষ্টা করুন</div>';
        pinInput.value = '';
        pinInput.focus();
        const loginCard = document.querySelector('.login-card');
        if (loginCard) {
          loginCard.style.transform = 'translateX(3px)';
          setTimeout(() => { if(loginCard) loginCard.style.transform = ''; }, 100);
        }
      }
    }

    // লগআউট ফাংশন
    function logoutAndReset() {
      dashboardDiv.classList.remove('visible');
      dashboardDiv.classList.add('hidden');
      loginOverlay.style.display = 'flex';
      if (pinInput) pinInput.value = '';
      if (errorDiv) errorDiv.innerHTML = '';
      if (cardsContainer) cardsContainer.innerHTML = '';
      // মোডাল বন্ধ করে দেয়া
      closeModal();
      setTimeout(() => pinInput && pinInput.focus(), 30);
    }

    // ইভেন্ট লিসেনার
    if (loginBtn) loginBtn.addEventListener('click', attemptLogin);
    if (pinInput) {
      pinInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') attemptLogin();
      });
    }
    if (logoutBtn) logoutBtn.addEventListener('click', logoutAndReset);
    
    // মোডাল বাটন ইভেন্ট
    if (copyBtn) copyBtn.addEventListener('click', copyLinkToClipboard);
    if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
    // মোডালের বাইরে ক্লিক করলেও বন্ধ
    if (modal) {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });
    }

    // পেজ ক্যাশে রিলেটেড রিসেট
    window.addEventListener('pageshow', () => {
      if (loginOverlay && dashboardDiv) {
        if (loginOverlay.style.display !== 'none' && dashboardDiv.classList.contains('visible')) {
          logoutAndReset();
        } else if (loginOverlay.style.display === 'none' && dashboardDiv.classList.contains('hidden')) {
          logoutAndReset();
        }
      }
    });

    console.log("✅ Mahir Enterprise | EKYC কার্ড যুক্ত হয়েছে (মোডাল + কপি বাটন)");
  })();
</script>
</body>
</html>
